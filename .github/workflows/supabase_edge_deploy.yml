name: Deploy Supabase edge functions

on:
  workflow_dispatch:
  push:
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase_edge_deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync Supabase secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            NOMIS_BASE_URL=${{ secrets.NOMIS_BASE_URL }} \
            NOMIS_USER=${{ secrets.NOMIS_USER }} \
            NOMIS_API_KEY=${{ secrets.NOMIS_API_KEY }} \
            NOMIS_DATASET_IDS=${{ secrets.NOMIS_DATASET_IDS }}

      - name: Deploy nomis_monthly_check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy nomis_monthly_check \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
