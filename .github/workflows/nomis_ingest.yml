name: Nomis ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover datasets
        env:
          NOMIS_BASE_URL: ${{ secrets.NOMIS_BASE_URL }}
          NOMIS_USER: ${{ secrets.NOMIS_USER }}
          NOMIS_API_KEY: ${{ secrets.NOMIS_API_KEY }}
        run: |
          python scripts/nomis_discover.py

      - name: Ingest population datasets
        env:
          NOMIS_BASE_URL: ${{ secrets.NOMIS_BASE_URL }}
          NOMIS_USER: ${{ secrets.NOMIS_USER }}
          NOMIS_API_KEY: ${{ secrets.NOMIS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python scripts/nomis_ingest.py
